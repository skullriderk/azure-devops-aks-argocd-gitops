# Docker
# Build and push an image to Azure Container Registry
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
  paths:
    include:
      - result/*

resources:
  - repo: self

variables:
  # Container registry service connection established during pipeline creation
  dockerRegistryServiceConnection: "githubproject-acr"
  imageRepository: "resultapp"
  containerRegistry: "githubproject.azurecr.io"
  dockerfilePath: "$(Build.SourcesDirectory)/result/Dockerfile"
  tag: "$(Build.BuildId)"

  # Agent VM image name
  vmImageName: "ubuntu-latest"

stages:
  - stage: Build
    displayName: Build and push stage
    jobs:
      - job: Build
        displayName: Build
        pool:
          vmImage: $(vmImageName)
        steps:
          - task: Docker@2
            displayName: Build and push an image to container registry
            inputs:
              command: buildAndPush
              repository: $(imageRepository)
              dockerfile: $(dockerfilePath)
              containerRegistry: $(dockerRegistryServiceConnection)
              tags: |
                $(tag)
  
  - stage: Update
    displayName: Update Kubernetes Manifest
    dependsOn: Build

    jobs:
    - job: Update
      displayName: Update Manifest
      steps:

        - script: |
            sed -i 's/\r$//' scripts/updatek8Manifests.sh
          displayName: Convert CRLF to LF

        - task: ShellScript@2
          displayName: Update Manifest Image Tag
          inputs:
            scriptPath: 'scripts/updatek8Manifests.sh'
            args: 'result $(imageRepository) $(tag)'